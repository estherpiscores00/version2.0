<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Estadísticas · Senderistas</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --fuente: 'Nunito', sans-serif;
      --stone:  #1a1a18;
      --peak:   #c8a96e;
      --snow:   #f0ede8;
      --mist:   #b8c4be;
      --bg:     #f2f0ec;
      --c4:     #3a7d5a;
      --c2:     #e05c2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: var(--fuente);
      background: var(--bg);
      color: var(--stone);
      overflow: hidden;
    }

    .app { 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      height: 100dvh; 
    }

    /* ── HEADER ── */
    header {
      background: var(--stone);
      padding: 0 16px;
      padding-top: env(safe-area-inset-top, 0);
      height: calc(54px + env(safe-area-inset-top, 0));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 1000;
    }

    .header-title { font-size: 1.1rem; font-weight: 800; color: var(--snow); }
    .header-title span { color: var(--peak); }

    .btn-back {
      padding: 6px 13px;
      background: transparent;
      border: 1px solid var(--peak);
      border-radius: 20px;
      color: var(--peak);
      font-family: var(--fuente);
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
    }

    /* ── CARDS SCROLL ── */
    .cards-scroll {
      flex: 1;
      overflow-x: auto;
      display: flex;
      gap: 14px;
      padding: 16px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .cards-scroll::-webkit-scrollbar { display: none; }

    .stat-card {
      flex-shrink: 0;
      width: calc(100vw - 48px);
      max-width: 380px;
      background: white;
      border-radius: 22px;
      padding: 20px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════
       CARD 1 — CLASIFICACIÓN (estilo LaLiga)
    ══════════════════════════════════════════ */

    #card1 {
      padding: 18px 0 0 0;
      overflow: hidden;
    }

    /* Cabecera de la card */
    .clas-top {
      padding: 0 16px 12px 16px;
    }

    .clas-title {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--stone);
      margin-bottom: 10px;
    }

    /* Filtro temporada estilo LaLiga */
    .clas-filters {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 8px 12px;
    }

    .filter-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .filter-select-wrap {
      display: flex;
      flex-direction: column;
    }

    .filter-select-wrap .filter-label {
      margin-bottom: 1px;
    }

    .clas-filters select {
      border: none;
      background: transparent;
      font-family: var(--fuente);
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--stone);
      cursor: pointer;
      outline: none;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    .clas-filters select option {
      font-size: 1rem;
      font-weight: 700;
      color: var(--stone);
      background: white;
    }

    .select-arrow {
      font-size: 0.6rem;
      color: #aaa;
      margin-left: 2px;
    }

    .filter-divider {
      width: 1px;
      height: 28px;
      background: #ddd;
      margin: 0 2px;
    }

    /* Cabecera de la tabla */
    /* Columnas: banda | # | Nombre | Rts | Km | Desn | Últimas5 */
    .clas-thead,
    .clas-row {
      display: grid;
      grid-template-columns: 5px 20px 1fr 24px 38px 38px 66px;
      align-items: center;
      gap: 0;
    }

    .clas-thead {
      padding: 6px 8px 6px 0;
      border-bottom: 1.5px solid #eee;
    }

    .clas-thead-cell {
      font-size: 0.65rem;
      font-weight: 700;
      color: #aaa;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .clas-thead-cell.left { text-align: left; padding-left: 6px; }
    .clas-thead-cell.pts  { color: #666; font-weight: 700; font-size: 0.65rem; }

    /* Cuerpo scrollable */
    .clas-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .clas-body::-webkit-scrollbar { display: none; }

    /* Fila de senderista */
    .clas-row {
      border-bottom: 1px solid #f4f4f4;
      min-height: 40px;
      transition: background 0.15s;
      padding-right: 8px;
    }

    .clas-row:hover { background: #fafafa; }

    /* Banda de color izquierda */
    .clas-banda {
      width: 5px;
      height: 100%;
      min-height: 42px;
      border-radius: 0 3px 3px 0;
    }

    .clas-banda.podium { background: var(--c4); }
    .clas-banda.none   { background: transparent; }

    /* Posición */
    .clas-pos {
      font-size: 0.8rem;
      font-weight: 800;
      color: #bbb;
      text-align: center;
    }

    /* Nombre */
    .clas-nombre {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--stone);
      padding-left: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Estadísticas numéricas */
    .clas-stat {
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      text-align: center;
    }

    .clas-stat.pts-col {
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
    }

    /* Últimas 5 rutas */
    .clas-ultimas {
      display: flex;
      gap: 1px;
      justify-content: center;
      align-items: center;
      padding: 0 2px;
    }

    .ult-icon {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ult-icon.si {
      background: var(--c4);
    }

    .ult-icon.no {
      background: var(--c2);
    }

    .ult-icon svg {
      width: 10px;
      height: 10px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── OTROS ELEMENTOS ── */
    .card-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .card-title { font-weight: 800; font-size: 1rem; }
    .summary-value { font-size: 2rem; font-weight: 900; }
    .summary-unit { font-size: 0.8rem; color: #aaa; margin-left: 5px; }
    .chart-wrap { flex: 1; min-height: 150px; }

    /* ── CARD GRÁFICOS AGRUPADOS ── */
    #card-graficos {
      padding: 12px;
      overflow: hidden;
    }

    .graficos-scroll {
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: none;
      padding-right: 2px;
    }
    .graficos-scroll::-webkit-scrollbar { display: none; }

    .mini-card {
      background: #fafafa;
      border-radius: 14px;
      padding: 12px 14px 10px 14px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .chart-wrap-mini {
      height: 100px;
      margin-top: 6px;
    }
    
    .dots { display: flex; justify-content: center; gap: 6px; padding: 15px; }
    .dot { height: 6px; width: 6px; border-radius: 3px; background: #ddd; transition: 0.2s; }

    #loader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
    #loader.oculto { opacity: 0; pointer-events: none; }
    .spinner { width: 30px; height: 30px; border: 3px solid #ddd; border-top-color: var(--peak); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div class="app">
  <header>
    <div class="header-title">Esta<span>dísticas</span></div>
    <a href="index.html" class="btn-back">← Volver</a>
  </header>

  <div class="cards-scroll" id="cards-scroll">

    <!-- ══ CARD 1: CLASIFICACIÓN ══ -->
    <div class="stat-card" id="card1">

      <div class="clas-top">
        <div class="clas-title">Clasificación</div>
        <div class="clas-filters">
          <div class="filter-select-wrap">
            <span class="filter-label">Temporada</span>
            <div style="display:flex;align-items:center;gap:4px;">
              <select id="temporada-select"></select>
              <span class="select-arrow">▼</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Cabecera columnas -->
      <div class="clas-thead">
        <div></div>
        <div class="clas-thead-cell">#</div>
        <div class="clas-thead-cell left">Senderista</div>
        <div class="clas-thead-cell">Rts</div>
        <div class="clas-thead-cell">Km</div>
        <div class="clas-thead-cell ">Des</div>
        <div class="clas-thead-cell">Últimas 5</div>
      </div>

      <!-- Filas -->
      <div class="clas-body" id="ranking-body"></div>

    </div>
    <!-- FIN CARD 1 -->

    <!-- Card 2: GRÁFICOS agrupados con scroll vertical -->
    <div class="stat-card" id="card-graficos">
      <div class="graficos-scroll">

        <div class="mini-card">
          <div class="card-header"><div class="card-title">Participación</div><div>👥</div></div>
          <div><span class="summary-value" id="sum3">-</span><span class="summary-unit">media senderistas</span></div>
          <div class="chart-wrap-mini"><canvas id="chart3"></canvas></div>
        </div>

        <div class="mini-card">
          <div class="card-header"><div class="card-title">Rutas</div><div>🥾</div></div>
          <div><span class="summary-value" id="sum1">-</span><span class="summary-unit">totales</span></div>
          <div class="chart-wrap-mini"><canvas id="chart1"></canvas></div>
        </div>

        <div class="mini-card">
          <div class="card-header"><div class="card-title">Kilómetros</div><div>📏</div></div>
          <div><span class="summary-value" id="sum2">-</span><span class="summary-unit">km acumulados</span></div>
          <div class="chart-wrap-mini"><canvas id="chart2"></canvas></div>
        </div>

        <div class="mini-card">
          <div class="card-header"><div class="card-title">Desnivel</div><div>⛰️</div></div>
          <div><span class="summary-value" id="sum4">-</span><span class="summary-unit">metros totales</span></div>
          <div class="chart-wrap-mini"><canvas id="chart4"></canvas></div>
        </div>

      </div>
    </div>
  </div>

  <div class="dots" id="dots">
    <div class="dot"></div><div class="dot"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="estad.js"></script>
</body>
</html>
