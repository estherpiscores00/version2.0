<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Estadísticas · Senderistas</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --fuente: 'Nunito', sans-serif;
      --stone:  #1a1a18;
      --peak:   #c8a96e;
      --snow:   #f0ede8;
      --mist:   #b8c4be;
      --bg:     #f2f0ec;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      font-family: var(--fuente);
      background: var(--bg);
      color: var(--stone);
      overflow: hidden; /* Evita que la página entera haga scroll */
    }

    .app { 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      height: 100dvh; 
    }

    /* ── HEADER FIJO ── */
    header {
      background: var(--stone);
      padding: 0 16px;
      padding-top: env(safe-area-inset-top, 0); /* Manejo de Notch */
      height: calc(54px + env(safe-area-inset-top, 0));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(200,169,110,0.2);
      z-index: 1000;
      position: relative;
    }

    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-title { font-size: 1.1rem; font-weight: 800; color: var(--snow); }
    .header-title span { color: var(--peak); }

    .btn-back {
      padding: 6px 13px;
      background: transparent;
      border: 1px solid var(--peak);
      border-radius: 20px;
      color: var(--peak);
      font-family: var(--fuente);
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-back:active { background: var(--peak); color: var(--stone); }

    /* ── ZONA DE CARDS ── */
    .cards-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      gap: 14px;
      padding: 16px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      align-items: stretch;
    }
    .cards-scroll::-webkit-scrollbar { display: none; }

    .stat-card {
      flex-shrink: 0;
      width: calc(100vw - 48px);
      max-width: 360px;
      background: white;
      border-radius: 22px;
      padding: 20px 18px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%; /* Forzamos altura para que el flex interno funcione */
    }

    /* ── CABECERAS Y GRÁFICOS ── */
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; flex-shrink: 0; }
    .card-icon { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .card-title { font-size: 1.05rem; font-weight: 800; color: var(--stone); line-height: 1.2; flex: 1; }
    .card-summary { display: flex; align-items: baseline; gap: 6px; flex-shrink: 0; }
    .summary-value { font-size: 2.2rem; font-weight: 900; line-height: 1; }
    .summary-unit  { font-size: 0.8rem; font-weight: 600; color: #aaa; }
    .chart-wrap { flex: 1; position: relative; min-height: 120px; }

    /* ── COLORES ── */
    .c1 .card-icon { background: rgba(240,165,0,0.1); }
    .c2 .summary-value { color: #e05c2a; } .c2 .card-icon { background: rgba(224,92,42,0.1); }
    .c3 .summary-value { color: #1a7fc1; } .c3 .card-icon { background: rgba(26,127,193,0.1); }
    .c4 .summary-value { color: #3a7d5a; } .c4 .card-icon { background: rgba(58,125,90,0.1); }
    .c5 .summary-value { color: #c8a96e; } .c5 .card-icon { background: rgba(200,169,110,0.12); }

    /* ── PASTILLAS MEDALLERO ── */
    .medallero-pill {
      background: white;
      border-radius: 22px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
    }

    .podium-temporada { text-align: center; font-size: 0.7rem; font-weight: 800; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
    .podium-stage { display: flex; align-items: flex-end; justify-content: center; gap: 6px; padding-bottom: 4px; }
    .podium-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .podium-medal { font-size: 1.5rem; }
    .podium-name { font-size: 0.75rem; font-weight: 800; text-align: center; line-height: 1.1; }
    .podium-count { font-size: 0.7rem; font-weight: 700; margin-bottom: 2px; }
    .podium-bar { width: 100%; border-radius: 5px 5px 2px 2px; border: 2px solid; }

    .diploma-section, .resto-section { display: flex; flex-direction: column; gap: 4px; }
    .diploma-label, .resto-label { font-size: 0.6rem; font-weight: 800; color: #ccc; text-transform: uppercase; margin-bottom: 2px; }
    .diploma-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #faf9f7; border-radius: 10px; }
    .diploma-pos { font-size: 0.8rem; font-weight: 900; color: #ddd; width: 18px; }
    .diploma-name { flex: 1; font-size: 0.85rem; font-weight: 700; }
    .diploma-n { font-size: 0.8rem; font-weight: 700; color: #999; }
    .resto-row { display: flex; align-items: center; gap: 8px; padding: 4px 10px; }
    .resto-pos { font-size: 0.75rem; font-weight: 800; color: #eee; width: 18px; }
    .resto-name { flex: 1; font-size: 0.8rem; color: #888; font-weight: 600; }
    .resto-n { font-size: 0.75rem; color: #ccc; font-weight: 700; }

    .podium-chips-wrap { overflow-x: auto; scrollbar-width: none; }
    #podium-chips { display: flex; gap: 6px; width: max-content; }
    .pod-chip {
      padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
      background: #f0ede8; color: #888; border: 1px solid #e0dbd3; white-space: nowrap;
    }
    .pod-chip.active { background: var(--stone); color: var(--peak); border-color: var(--stone); }

    /* ── DOTS ── */
    .dots {
      display: flex; justify-content: center; gap: 6px;
      padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0));
      flex-shrink: 0;
    }
    .dot { height: 6px; width: 6px; border-radius: 3px; background: #ddd; transition: all 0.2s; }

    #loader { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; transition: opacity 0.3s; }
    #loader.oculto { opacity: 0; pointer-events: none; }
    .loader-spinner { width: 30px; height: 30px; border: 3px solid #ddd; border-top-color: var(--peak); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-spinner"></div>
</div>

<div class="app">
  <header>
    <div class="header-left">
      <span style="font-size:18px">📊</span>
      <span class="header-title">Esta<span>dísticas</span></span>
    </div>
    <a href="index.html" class="btn-back">← Volver</a>
  </header>

  <div class="cards-scroll" id="cards-scroll">
    <div class="stat-card c1" id="card-medallero" style="background:transparent; box-shadow:none; padding:0; gap:12px;">
      <div class="medallero-pill" style="position:relative; flex-shrink:0;">
        <canvas id="fireworks-canvas" style="position:absolute; inset:0; pointer-events:none; z-index:10;"></canvas>
        <div class="card-header" style="position:relative; z-index:1;">
          <div class="card-title">Medallero</div>
          <div class="card-icon">🏆</div>
        </div>
        <div id="podium-top" style="position:relative; z-index:1;"></div>
      </div>

      <div class="medallero-pill" style="flex:1; overflow-y:auto; -webkit-overflow-scrolling: touch;">
        <div id="podium-rest"></div>
      </div>

      <div class="medallero-pill" style="flex-shrink:0; padding: 10px 14px;">
        <div class="podium-chips-wrap"><div id="podium-chips"></div></div>
      </div>
    </div>

    <div class="stat-card c2">
      <div class="card-header"><div class="card-title">Rutas por temporada</div><div class="card-icon">🥾</div></div>
      <div class="card-summary"><span class="summary-value" id="sum1">—</span><span class="summary-unit">rutas totales</span></div>
      <div class="chart-wrap"><canvas id="chart1"></canvas></div>
    </div>

    <div class="stat-card c3">
      <div class="card-header"><div class="card-title">Kilómetros por temporada</div><div class="card-icon">📏</div></div>
      <div class="card-summary"><span class="summary-value" id="sum2">—</span><span class="summary-unit">km totales</span></div>
      <div class="chart-wrap"><canvas id="chart2"></canvas></div>
    </div>

    <div class="stat-card c4">
      <div class="card-header"><div class="card-title">Media participantes</div><div class="card-icon">👥</div></div>
      <div class="card-summary"><span class="summary-value" id="sum3">—</span><span class="summary-unit">media / ruta</span></div>
      <div class="chart-wrap"><canvas id="chart3"></canvas></div>
    </div>

    <div class="stat-card c5">
      <div class="card-header"><div class="card-title">Desnivel acumulado</div><div class="card-icon">⛰️</div></div>
      <div class="card-summary"><span class="summary-value" id="sum4">—</span><span class="summary-unit">m totales</span></div>
      <div class="chart-wrap"><canvas id="chart4"></canvas></div>
    </div>
  </div>

  <div class="dots" id="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="estad.js"></script>
</body>
</html>
